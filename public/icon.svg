<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0FAE95"/>
      <stop offset="55%" stop-color="#007C73"/>
      <stop offset="100%" stop-color="#003D3D"/>
    </radialGradient>

    <linearGradient id="card" x1="55" y1="26" x2="130" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDF7E5"/>
      <stop offset="0.55" stop-color="#10B99C"/>
      <stop offset="1" stop-color="#007C73"/>
    </linearGradient>

    <linearGradient id="wallet" x1="48" y1="59" x2="123" y2="137" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="0.55" stop-color="#F8F0E5"/>
      <stop offset="1" stop-color="#E7DDD1"/>
    </linearGradient>

    <linearGradient id="teal" x1="52" y1="70" x2="134" y2="133" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00B89B"/>
      <stop offset="0.5" stop-color="#008F80"/>
      <stop offset="1" stop-color="#00695F"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#001F1F" flood-opacity="0.35"/>
    </filter>

    <filter id="innerShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#005B55" flood-opacity="0.35"/>
    </filter>

    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#002E2E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect x="7" y="7" width="166" height="166" rx="34" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="163" height="163" rx="32.5" stroke="#35D7C3" stroke-opacity="0.22" stroke-width="3"/>

  <!-- Card behind wallet -->
  <path d="M52.5 61.5C52.5 54.2 57.6 47.9 64.7 46.4L117.9 35.2C128.1 33.1 137.7 40.9 137.7 51.3V86.5H52.5V61.5Z"
        fill="url(#card)" filter="url(#smallShadow)"/>
  <path d="M62.8 59.7C62.8 56.5 65 53.7 68.1 53L118.6 42.5C123.9 41.4 128.9 45.4 128.9 50.8V73.8H62.8V59.7Z"
        fill="#008978" opacity="0.56"/>

  <!-- Wallet body -->
  <rect x="32" y="59" width="115" height="86" rx="18" fill="url(#wallet)" filter="url(#softShadow)"/>
  <path d="M34 77C34 68.2 41.2 61 50 61H129C137.8 61 145 68.2 145 77V91H34V77Z"
        fill="#FFFFFF" opacity="0.28"/>

  <!-- Side tab -->
  <path d="M130 85H150C157.2 85 163 90.8 163 98V114C163 121.2 157.2 127 150 127H130C123.4 127 118 121.6 118 115V97C118 90.4 123.4 85 130 85Z"
        fill="url(#teal)" filter="url(#smallShadow)"/>
  <circle cx="144" cy="106" r="8.2" fill="#FFF8ED" filter="url(#innerShadow)"/>

  <!-- Growth arrow -->
  <path d="M52 118L70 100L85 115L116 84"
        stroke="url(#teal)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerShadow)"/>
  <path d="M99 84H116V101"
        stroke="url(#teal)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerShadow)"/>

  <!-- subtle highlight -->
  <path d="M46 65C38.8 65 34 70.7 34 78V137C34 141.4 37.6 145 42 145H137"
        stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>
</svg>
